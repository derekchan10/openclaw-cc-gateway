server:
  port: 3456
  host: "0.0.0.0"
  # Docker host IP accessible from containers (auto-detected if omitted)
  # docker_host_ip: "172.17.0.1"

cli:
  bin: "claude"
  timeout: 900000       # 15 minutes per request
  max_concurrent: 3     # max simultaneous CLI subprocesses
  # skill_file: ./openclaw-skill.md  # resolved relative to cwd
  effort: "low"                 # low | medium | high | max (reduces thinking time)

session:
  ttl: 3600             # 1 hour
  cleanup_interval: 900 # 15 minutes

skills:
  sync: "auto"          # auto: sync on --setup | manual: use `manage skills sync` | disabled
  dir: "./skills"       # where synced skills are stored

# Tenants are auto-generated by `--setup`, or define manually:
tenants: []
  # - name: dc
  #   api_key: "generate-with-openssl-rand-hex-32"
  # - name: amanda
  #   api_key: "generate-with-openssl-rand-hex-32"
